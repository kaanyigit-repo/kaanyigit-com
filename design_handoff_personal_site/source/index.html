<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kaan Yigit — Website Refresh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link href="directions/document.css?v=2" rel="stylesheet">
<link href="directions/document_v4.css?v=1" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  @font-face { font-family: 'Migra'; src: local('Times New Roman'); }
  @font-face { font-family: 'Neue Haas Grotesk Display'; src: local('Helvetica Neue'); }
  @font-face { font-family: 'Söhne Breit'; src: local('Helvetica Neue'); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="directions/editorial.jsx"></script>
<script type="text/babel" src="directions/terminal.jsx"></script>
<script type="text/babel" src="directions/brutalist.jsx"></script>
<script type="text/babel" src="directions/editorial_v2.jsx"></script>
<script type="text/babel" src="directions/document.jsx"></script>
<script type="text/babel" src="directions/document_v4.jsx"></script>

<script type="text/babel">
  const TWEAKS = /*EDITMODE-BEGIN*/{
    "accent": "ember",
    "displayFont": "fraunces",
    "theme": "dark",
    "showMarquee": false,
    "photoUrl": "https:\/\/media.licdn.com\/dms\/image\/v2\/D4D03AQGoaix1Cd_j4w\/profile-displayphoto-shrink_400_400\/B4DZbSNE7rG8Ag-\/0\/1747283365930?e=1779321600&v=beta&t=r4Fd-bq69HUwRe5iA7hg4yZvLIplR7DxKhUT0VSUFi4"
  }/*EDITMODE-END*/;

  function App() {
    const [tweaks, setTweaks] = React.useState(TWEAKS);
    const [panelOpen, setPanelOpen] = React.useState(false);

    React.useEffect(() => {
      const onMsg = (e) => {
        if (!e.data || typeof e.data !== 'object') return;
        if (e.data.type === '__activate_edit_mode') setPanelOpen(true);
        if (e.data.type === '__deactivate_edit_mode') setPanelOpen(false);
      };
      window.addEventListener('message', onMsg);
      window.parent.postMessage({type:'__edit_mode_available'}, '*');
      return () => window.removeEventListener('message', onMsg);
    }, []);

    const update = (k, v) => {
      const next = {...tweaks, [k]: v};
      setTweaks(next);
      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]: v}}, '*');
    };

    return (
      <>
        <DesignCanvas>
          <DCSection id="v4" title="v4 — Document Edition (polished)" subtitle="Section 02 is now &lsquo;What I&rsquo;m building&rsquo;. Body copy reframed first-person — you&rsquo;re the subject, employers are context.">
            <DCArtboard id="doc4-light" label="v4 · Document (Light)" width={1100} height={5000}>
              <DocumentSiteV4 {...tweaks} />
            </DCArtboard>
            <DCArtboard id="doc4-dark" label="v4 · Document (Dark)" width={1100} height={5000}>
              <DocumentSiteV4 {...tweaks} theme={tweaks.theme === 'light' ? 'dark' : 'light'} />
            </DCArtboard>
          </DCSection>
          <DCSection id="v3" title="v3 — Document Edition" subtitle="Same landing, plainer body. The minimal-document baseline.">
            <DCArtboard id="doc-light" label="v3 · Document (Light)" width={1100} height={3200}>
              <DocumentSite {...tweaks} />
            </DCArtboard>
            <DCArtboard id="doc-dark" label="v3 · Document (Dark)" width={1100} height={3200}>
              <DocumentSite {...tweaks} theme={tweaks.theme === 'light' ? 'dark' : 'light'} />
            </DCArtboard>
          </DCSection>
          <DCSection id="v2" title="v2 — Editorial, Engineer Edition" subtitle="Earlier direction. Tech-forward voice, oversized headers, contact poster.">
            <DCArtboard id="ed2" label="Editorial v2" width={1440} height={4600}>
              <EditorialV2 {...tweaks} />
            </DCArtboard>
          </DCSection>
          <DCSection id="v1" title="v1 — Original three directions" subtitle="For comparison.">
            <DCArtboard id="editorial" label="01 · Editorial Serif (v1)" width={1440} height={3600}>
              <EditorialSite />
            </DCArtboard>
            <DCArtboard id="terminal" label="02 · Terminal Mono (v1)" width={1440} height={3600}>
              <TerminalSite />
            </DCArtboard>
            <DCArtboard id="brutalist" label="03 · Brutalist Grid (v1)" width={1440} height={3800}>
              <BrutalistSite />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>

        {panelOpen && (
          <div style={{position:'fixed',bottom:20,right:20,width:280,background:'#14120f',color:'#e8e2d4',border:'1px solid rgba(232,226,212,0.14)',padding:20,fontFamily:'JetBrains Mono, monospace',fontSize:11,zIndex:99999,boxShadow:'0 12px 40px rgba(0,0,0,0.4)'}}>
            <div style={{fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',opacity:0.6,marginBottom:16}}>Tweaks — Editorial v2</div>

            <div style={{marginBottom:16}}>
              <div style={{marginBottom:8,opacity:0.7}}>Theme (v3)</div>
              <div style={{display:'flex',gap:6}}>
                {['light','dark'].map(t => (
                  <button key={t} onClick={()=>update('theme',t)} style={{padding:'6px 10px',background:tweaks.theme===t?'#e8e2d4':'transparent',color:tweaks.theme===t?'#14120f':'#e8e2d4',border:'1px solid rgba(232,226,212,0.2)',fontFamily:'inherit',fontSize:10,textTransform:'uppercase',letterSpacing:'0.1em',cursor:'pointer'}}>{t}</button>
                ))}
              </div>
            </div>

            <div style={{marginBottom:16}}>
              <div style={{marginBottom:8,opacity:0.7}}>Accent</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {['gold','ember','oxblood','sage','sky','ink'].map(a => (
                  <button key={a} onClick={()=>update('accent',a)} style={{padding:'6px 10px',background:tweaks.accent===a?'#e8e2d4':'transparent',color:tweaks.accent===a?'#14120f':'#e8e2d4',border:'1px solid rgba(232,226,212,0.2)',fontFamily:'inherit',fontSize:10,textTransform:'uppercase',letterSpacing:'0.1em',cursor:'pointer'}}>{a}</button>
                ))}
              </div>
            </div>

            <div style={{marginBottom:16}}>
              <div style={{marginBottom:8,opacity:0.7}}>Display font</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {['fraunces','instrument','palatino'].map(f => (

                  <button key={f} onClick={()=>update('displayFont',f)} style={{padding:'6px 10px',background:tweaks.displayFont===f?'#e8e2d4':'transparent',color:tweaks.displayFont===f?'#14120f':'#e8e2d4',border:'1px solid rgba(232,226,212,0.2)',fontFamily:'inherit',fontSize:10,textTransform:'uppercase',letterSpacing:'0.1em',cursor:'pointer'}}>{f}</button>
                ))}
              </div>
            </div>

            <div style={{marginBottom:16}}>
              <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
                <input type="checkbox" checked={tweaks.showMarquee} onChange={e=>update('showMarquee',e.target.checked)} />
                <span>Top marquee strip</span>
              </label>
            </div>

            <div>
              <div style={{marginBottom:8,opacity:0.7}}>Photo URL (paste a link)</div>
              <input type="text" value={tweaks.photoUrl} onChange={e=>update('photoUrl',e.target.value)} placeholder="https://..." style={{width:'100%',padding:'6px 8px',background:'transparent',color:'#e8e2d4',border:'1px solid rgba(232,226,212,0.2)',fontFamily:'inherit',fontSize:11}} />
            </div>
          </div>
        )}
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
